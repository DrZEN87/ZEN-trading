<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>ZEN-Trading</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f12;--bg2:#16161a;--bg3:#1e1e24;--bg4:#26262e;
  --border:#2a2a34;--border2:#3a3a48;
  --text:#e2e2e8;--text2:#9090a0;--text3:#505060;
  --up:#22c55e;--dn:#ef4444;
  --blue:#3b82f6;--amber:#f59e0b;--purple:#8b5cf6;
  --r:7px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;font-size:13px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{display:flex;align-items:center;gap:4px;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
#logo{font-size:14px;font-weight:700;letter-spacing:-.5px;margin-right:4px;white-space:nowrap;color:var(--text)}
#logo span{color:var(--blue)}
#sym-in{width:80px;font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none}
#sym-in:focus{border-color:var(--blue)}
.btn{font-size:11px;padding:4px 8px;cursor:pointer;border-radius:var(--r);border:1px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;transition:background .1s,color .1s}
.btn:hover{background:var(--bg3);color:var(--text)}
.btn.ab{background:rgba(59,130,246,.15);color:var(--blue);border-color:rgba(59,130,246,.4)}
.btn.ag{background:rgba(34,197,94,.12);color:var(--up);border-color:rgba(34,197,94,.35)}
.btn.ar{background:rgba(239,68,68,.12);color:var(--dn);border-color:rgba(239,68,68,.35)}
.btn.aa{background:rgba(245,158,11,.12);color:var(--amber);border-color:rgba(245,158,11,.4)}
/* AI button */
#ai-btn{font-size:11px;padding:4px 10px;cursor:pointer;border-radius:var(--r);border:1px solid rgba(139,92,246,.5);background:rgba(139,92,246,.15);color:#c4b5fd;white-space:nowrap;transition:all .2s}
#ai-btn:hover{background:rgba(139,92,246,.25)}
#ai-btn.loading{opacity:.7;cursor:wait}
/* Auto-Fit "A" Trade Republik style */
#autofit-btn{font-size:12px;font-weight:700;width:26px;padding:4px 0;text-align:center;color:var(--text3);background:transparent;border:1px solid var(--border);border-radius:4px}
#autofit-btn.on{background:#fff;color:#000;border-color:#fff}
.sep{width:1px;height:16px;background:var(--border2);margin:0 1px;flex-shrink:0}
.tlbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
#main-row{display:flex;flex:1;min-height:0}
#watchlist{width:150px;min-width:100px;max-width:300px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#wl-resize{width:6px;cursor:ew-resize;background:rgba(148,163,184,.15);border-left:2px solid rgba(148,163,184,.3);flex-shrink:0;transition:background .15s;position:relative}
#wl-resize:hover{background:rgba(59,130,246,.5);border-left-color:rgba(59,130,246,.8)}
#wl-resize::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:2px;height:24px;background:rgba(148,163,184,.4);border-radius:1px}
#wl-resize:hover::after{background:rgba(59,130,246,.9)}
#wl-hdr{font-size:10px;font-weight:500;color:var(--text3);padding:7px 10px;border-bottom:1px solid var(--border);letter-spacing:.6px;text-transform:uppercase}
#wl-list{flex:1;overflow-y:auto}
#wl-list::-webkit-scrollbar{width:3px}
#wl-list::-webkit-scrollbar-thumb{background:var(--border2)}
.wl-item{display:flex;flex-direction:column;padding:6px 8px;cursor:pointer;border-bottom:1px solid var(--border);gap:2px;transition:background .1s;position:relative}
.wl-item:hover{background:var(--bg3)}
.wl-item.active{background:rgba(59,130,246,.1);border-right:2px solid var(--blue)}
.wl-row{display:flex;align-items:baseline;justify-content:space-between;gap:6px;width:100%}
.wl-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.wl-sym{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.wl-item.active .wl-name{color:var(--blue)}
.wl-price{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;flex-shrink:0}
.wl-chg{font-size:12px;white-space:nowrap;flex-shrink:0;text-align:right}
.wl-del{font-size:12px;color:var(--dn);cursor:pointer;opacity:0;position:absolute;top:4px;right:4px;background:var(--bg2);padding:1px 4px;border-radius:3px;z-index:2}
.wl-item:hover .wl-del{opacity:.6}
.wl-del:hover{opacity:1!important}
.wl-item[draggable]{cursor:grab}
.wl-item[draggable]:active{cursor:grabbing}
.wl-dragover{background:rgba(59,130,246,.2)!important;border-top:2px solid var(--blue)!important}
#chart-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#price-bar{display:flex;align-items:baseline;gap:8px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#sym-lbl{font-size:14px;font-weight:600;color:var(--text)}
#cur-price{font-size:20px;font-weight:300;color:var(--text);letter-spacing:-.5px;transition:color .2s}
.flash-up{color:#26a69a!important;font-weight:700!important}
.flash-dn{color:#ef5350!important;font-weight:700!important}
#price-chg{font-size:12px}
.up{color:var(--up)}.dn{color:var(--dn)}
#ohlc{font-size:11px;color:var(--text3);margin-left:auto}
#draw-hint{font-size:11px;color:var(--amber);padding:0 6px;display:none}
#ai-hint{font-size:11px;color:#c4b5fd;padding:0 6px;display:none}
#charts-scroll{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-height:0}
#charts-scroll::-webkit-scrollbar{width:3px}
#charts-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
#main-wrap{position:relative;height:60vh;flex-shrink:0;user-select:none}
#main-canvas{display:block;width:100%;height:100%}
#ov-canvas{position:absolute;top:0;left:0}
.ind-panel{border-top:1px solid var(--border);position:relative;flex-shrink:0;display:none}
.ind-panel.show{display:block}
.p-resize{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;z-index:10;background:rgba(148,163,184,.15);border-bottom:2px solid rgba(148,163,184,.3);transition:background .15s}
.p-resize:hover{background:rgba(59,130,246,.5);border-bottom-color:rgba(59,130,246,.8)}
.p-resize::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:2px;background:rgba(148,163,184,.4);border-radius:1px}
.p-resize:hover::after{background:rgba(59,130,246,.9)}
.panel-ov-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#main-ch-resize{height:8px;cursor:ns-resize;border-top:2px solid rgba(148,163,184,.3);flex-shrink:0;background:rgba(148,163,184,.15);transition:background .15s;position:relative}
#main-ch-resize:hover{background:rgba(59,130,246,.5);border-top-color:rgba(59,130,246,.8)}
#main-ch-resize::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:2px;background:rgba(148,163,184,.4);border-radius:1px}
#main-ch-resize:hover::after{background:rgba(59,130,246,.9)}
.p-lbl{position:absolute;top:5px;left:10px;font-size:10px;color:var(--text3);z-index:2;pointer-events:none}
.ind-panel canvas{display:block;width:100%;height:100%}
#alarm-panel{display:none;position:fixed;top:48px;right:10px;width:340px;max-height:calc(100vh - 70px);overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:10px 14px;background:var(--bg2);z-index:100;box-shadow:0 10px 40px rgba(0,0,0,.5)}
#alarm-panel h3{font-size:12px;font-weight:500;color:var(--text);margin-bottom:7px}
#al-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:7px}
#al-price{width:120px;font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);outline:none}
#al-price:focus{border-color:var(--amber)}
.atype{font-size:11px;padding:4px 9px;cursor:pointer;border:1px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text2)}
.atype.active{background:rgba(245,158,11,.12);color:var(--amber);border-color:rgba(245,158,11,.4)}
#al-set{font-size:11px;padding:5px 12px;cursor:pointer;border-radius:var(--r);background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.4)}
#al-list{display:flex;flex-wrap:wrap;gap:5px}
.al-tag{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--bg3);border:1px solid rgba(245,158,11,.35);color:var(--amber)}
.al-x{cursor:pointer;opacity:.6;font-size:12px}.al-x:hover{opacity:1}
#status-bar{padding:5px 12px;font-size:11px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;transition:color .2s}
#status-bar.st-loading{color:var(--amber)}
#status-bar.st-ok{color:var(--up)}
#status-bar.st-err{color:var(--dn)}
#status-bar.st-idle{color:var(--text3)}
#status-bar.st-ai{color:#c4b5fd}
#al-popup{position:fixed;bottom:24px;right:24px;z-index:9999;display:none;flex-direction:column;width:290px;animation:slideIn .3s ease;border-radius:12px;overflow:hidden}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
.pop-inner{background:var(--bg2);border:1px solid rgba(245,158,11,.5);border-bottom:none;border-radius:12px 12px 0 0;padding:14px 16px;position:relative}
.pop-title{font-size:11px;color:var(--amber);font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.pop-body{font-size:16px;color:var(--text);margin-bottom:4px}
.pop-meta{font-size:11px;color:var(--text3)}
.pop-close{position:absolute;top:10px;right:14px;cursor:pointer;color:var(--text3);font-size:16px}
.pop-close:hover{color:var(--text)}
.pop-bar{height:3px;background:var(--amber);transform-origin:left;animation:barDown 8s linear forwards}
@keyframes barDown{from{transform:scaleX(1)}to{transform:scaleX(0)}}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;transition:opacity .3s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:26px;height:26px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.flash-up{color:var(--up)!important;font-weight:700!important;transition:color .2s,font-weight .2s}
.flash-dn{color:var(--dn)!important;font-weight:700!important;transition:color .2s,font-weight .2s}
#loading p{font-size:11px;color:var(--text3)}
/* AI drawings have a distinct style */
.ai-badge{position:absolute;top:8px;right:60px;font-size:10px;color:#c4b5fd;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:4px;padding:2px 6px;pointer-events:none}
</style>
</head>

  <input id="al-email" type="email" placeholder="email@beispiel.de" style="width:160px;font-size:11px;padding:4px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text)"/>

<script>

// Polyfill for ctx.roundRect (not in all browsers)
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);
    this.closePath();return this;
  };
}

// ══════════════════════════════════════════════════════════
// KI-ANALYSE SETUP
// ══════════════════════════════════════════════════════════
// API-Keys werden NICHT im Code gespeichert (Sicherheit!)
// Stattdessen: Key wird beim ersten Klick auf KI-Analyse
// abgefragt und in localStorage gespeichert.
//
// Unterstützt:
//   A) Google Gemini (kostenlos): aistudio.google.com → Get API key
//   B) Anthropic Claude (kostenpflichtig, braucht CORS-Proxy)
//
function getApiKey(provider){return localStorage.getItem('chartpro_'+provider+'_key')||'';}
function setApiKey(provider,key){localStorage.setItem('chartpro_'+provider+'_key',key);}
function getAIProvider(){return localStorage.getItem('chartpro_ai_provider')||'gemini';}
function setAIProvider(p){localStorage.setItem('chartpro_ai_provider',p);}


// ── State ─────────────────────────────────────────────────────
let candles=[],alarms=[],alarmType='above',watchlist=[];
let showSMA200=true,showSMA50=true,showEMA21=true,showBB=false;
let showRSI=true,showSRSI=true,showMACD=true,showATR=true;
let showVol=true,showVolProfile=true,autoFit=true;
let currentTF='d1',currentSymbol='SAP.DE',chartType='candles';

function getCurrency(sym){
  if(!sym)return'$';
  if(/\.(DE|PA|MI|AS|SW|VI|BR|HE|OL|ST|CO)$/i.test(sym))return'€';
  if(/\.L$/i.test(sym))return'£';
  if(/\.TO$/i.test(sym))return'C$';
  if(/\.(T|TYO)$/i.test(sym))return'¥';
  return'$';
}

// Multiple CORS proxies — tried in order until one works
// ── Data fetching ────────────────────────────────────────────
const CORS_PROXIES = [
  'https://corsproxy.io/?url=',
  'https://api.allorigins.win/raw?url=',
  'https://api.codetabs.com/v1/proxy?quest=',
  'https://cors-anywhere.herokuapp.com/',
  'https://thingproxy.freeboard.io/fetch/'
];

async function corsGet(rawUrl, timeoutMs=7000){
  for(const base of CORS_PROXIES){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
      const url=base+encodeURIComponent(rawUrl);
      const r=await fetch(url,{signal:ctrl.signal});
      clearTimeout(tid);
      if(!r.ok)continue;
      const txt=await r.text();
      if(txt&&txt.length>50)return txt;
    }catch{}
  }
  // Last resort: direct fetch (works for some APIs that allow CORS)
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
    const r=await fetch(rawUrl,{signal:ctrl.signal});
    clearTimeout(tid);
    if(r.ok){const txt=await r.text();if(txt&&txt.length>50)return txt;}
  }catch{}
  return null;
}

// Stooq.com: SAP.DE→sap.de  AAPL→aapl.us
function stooqSym(s){return /\.[A-Z]{2,3}$/.test(s)?s.toLowerCase():(s+'.US').toLowerCase();}

async function loadCandles(sym,tf){
  const iYahoo={'5m':'5m','1h':'1h','4h':'4h',d1:'1d',w1:'1wk',m1:'1mo'};
  const rYahoo={'5m':'5d','1h':'1mo','4h':'6mo',d1:'5y',w1:'max',m1:'max'};

  // ── Helper: aggregate daily candles into weekly or monthly ──
  function aggregateCandles(dailyRows, period){
    if(!dailyRows.length)return[];
    const groups={};
    dailyRows.forEach(c=>{
      let key;
      if(period==='w1'){
        // ISO week: Monday-based week
        const d=new Date(c.t);const day=d.getDay()||7;
        const monday=new Date(d);monday.setDate(d.getDate()-(day-1));
        key=monday.getFullYear()+'-'+String(monday.getMonth()+1).padStart(2,'0')+'-'+String(monday.getDate()).padStart(2,'0');
      }else{
        // Monthly
        key=c.t.getFullYear()+'-'+String(c.t.getMonth()+1).padStart(2,'0');
      }
      if(!groups[key])groups[key]=[];
      groups[key].push(c);
    });
    return Object.keys(groups).sort().map(k=>{
      const g=groups[k];
      return{t:g[0].t,o:g[0].o,h:Math.max(...g.map(c=>c.h)),l:Math.min(...g.map(c=>c.l)),c:g[g.length-1].c,v:g.reduce((s,c)=>s+c.v,0)};
    });
  }

  // ── Try Yahoo Finance ──
  async function tryYahoo(sym,tf){
    const yUrls=[
      `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${iYahoo[tf]}&range=${rYahoo[tf]||'max'}`,
      `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=${iYahoo[tf]}&range=${rYahoo[tf]||'max'}`,
    ];
    for(const url of yUrls){
      const txt=await corsGet(url,8000);
      if(!txt||!txt.startsWith('{'))continue;
      try{
        const j=JSON.parse(txt);
        const res=j.chart?.result?.[0];if(!res)continue;
        const ts=res.timestamps||res.timestamp;if(!ts)continue;
        const q=res.indicators.quote[0];
        const rows=ts.map((t,i)=>({t:new Date(t*1000),o:q.open[i],h:q.high[i],l:q.low[i],c:q.close[i],v:q.volume[i]||0}))
          .filter(c=>c.o!=null&&c.c!=null&&c.c>0);
        if(rows.length>0){
          const meta=res.meta;
          if(meta){const name=meta.longName||meta.shortName||'';if(name)setSymName(sym,name);}
          return{candles:rows,source:'Yahoo'};
        }
      }catch{}
    }
    return null;
  }

  // ── Try Stooq (always loads daily, then aggregates if needed) ──
  async function tryStooqDaily(sym){
    const now=new Date();const from=new Date(now.getFullYear()-10,now.getMonth(),now.getDate());
    const d1=`${from.getFullYear()}${String(from.getMonth()+1).padStart(2,'0')}${String(from.getDate()).padStart(2,'0')}`;
    const d2=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    const stooqUrl=`https://stooq.com/q/d/l/?s=${stooqSym(sym)}&i=d&d1=${d1}&d2=${d2}`;
    const txt=await corsGet(stooqUrl,7000);
    if(txt&&txt.includes(',')){
      const lines=txt.trim().split('\n');
      const header=lines[0].toLowerCase();
      const hasVol=header.includes('volume')||header.includes('vol');
      const rows=lines.slice(1).map(l=>{
        const p=l.split(',');
        if(p.length<5)return null;
        const[yr,mo,dy]=p[0].split('-').map(Number);
        const c={t:new Date(yr,mo-1,dy),o:+p[1],h:+p[2],l:+p[3],c:+p[4],v:hasVol?parseInt(p[5])||0:0};
        return c.c>0&&!isNaN(c.c)?c:null;
      }).filter(Boolean);
      if(rows.length>10){
        rows.sort((a,b)=>a.t-b.t);
        // Validate: must be daily (avg gap ≤ 5 days)
        const sample=rows.slice(-20);let gapSum=0;
        for(let i=1;i<sample.length;i++)gapSum+=(sample[i].t-sample[i-1].t)/86400000;
        if(gapSum/(sample.length-1)<=5)return rows;
      }
    }
    return null;
  }

  // ── Strategy: Yahoo first, then Stooq daily + aggregate ──

  // 1. Try Yahoo directly for the requested timeframe
  const yahoo=await tryYahoo(sym,tf);
  if(yahoo)return yahoo;

  // 2. For D1/W1/M1: load daily from Stooq, aggregate if needed
  if(['d1','w1','m1'].includes(tf)){
    const dailyRows=await tryStooqDaily(sym);
    if(dailyRows){
      if(tf==='d1')return{candles:dailyRows,source:'Stooq'};
      if(tf==='w1')return{candles:aggregateCandles(dailyRows,'w1'),source:'Stooq→W1'};
      if(tf==='m1')return{candles:aggregateCandles(dailyRows,'m1'),source:'Stooq→M1'};
    }
  }

  return null;
}

function setStatus(msg,type){
  type=type||'idle';
  var el=document.getElementById('status-bar');
  if(el){el.textContent=msg;el.className='st-'+type;}
}

async function fetchData(sym,tf,silent=false,_retries=3){
  if(!silent)setStatus('Lade '+sym+'…','loading');

  // Hard timeout: hide loader after 25s no matter what
  const safetyTimer=setTimeout(()=>{
    hideLoading();
    setStatus('Timeout: '+sym+' — Verbindung zu langsam oder nicht verfügbar','err');
  },25000);

  try{
    const result=await loadCandles(sym,tf);
    clearTimeout(safetyTimer);
    if(!result||result.candles.length===0){
      // Auto-retry
      if(_retries>0){
        clearTimeout(safetyTimer);
        if(!silent)setStatus('Lade '+sym+'… (Versuch '+(4-_retries)+'/3)','loading');
        await new Promise(r=>setTimeout(r,1500));
        return fetchData(sym,tf,silent,_retries-1);
      }
      if(!silent)setStatus('Fehler: '+sym+' nicht gefunden','err');
      hideLoading();return null;
    }
    candles=result.candles;
    const n=candles.length;
    // Restore saved view for this symbol, or default to last 120
    const saved=symbolViews[sym+'_'+tf];
    if(saved&&saved.viewEnd<=n-1){
      viewStart=saved.viewStart;viewEnd=saved.viewEnd;
      yOverride=saved.yOverride||null;
      autoFit=saved.autoFit!==undefined?saved.autoFit:true;
      document.getElementById('autofit-btn').classList.toggle('on',autoFit);
    }else{
      yOverride=null;autoFit=true;
      document.getElementById('autofit-btn').classList.add('on');
      const show=Math.min(365,n);
      viewStart=n-show;viewEnd=n-1;ensureRightPad();
    }
    renderAll();
    // Try to fetch company name if not known yet
    if(!getSymName(sym))fetchSymName(sym);
    const from=candles[0].t.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
    const to=candles[n-1].t.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
    // Calculate avg gap for status
    const last20=candles.slice(-Math.min(20,n));let gapSum=0;for(let i=1;i<last20.length;i++)gapSum+=(last20[i].t-last20[i-1].t)/(86400000);const avgGap=(gapSum/(last20.length-1)).toFixed(1);
    if(!silent){
      setStatus(sym+' — '+n+' Kerzen via '+result.source+' ('+from+' → '+to+', Ø '+avgGap+'d/Kerze)','ok');
      setTimeout(()=>setStatus('Bereit · Mausrad: Zoom · Pointer-Modus: Zeichnung anklicken → Entf löschen','idle'),5000);
    }
    if(!silent)startLiveRefresh();
    hideLoading();return candles[candles.length-1]?.c;
  }catch(e){
    clearTimeout(safetyTimer);
    // Auto-retry on error
    if(_retries>0){
      if(!silent)setStatus('Lade '+sym+'… (Versuch '+(4-_retries)+'/3)','loading');
      await new Promise(r=>setTimeout(r,1500));
      return fetchData(sym,tf,silent,_retries-1);
    }
    if(!silent)setStatus('Fehler: '+sym+' ('+e.message+')','err');
    hideLoading();return null;
  }
}

// ── Technical Indicator Functions ─────────────────────────────
function sma(data,period){
  const out=[];let sum=0;
  for(let i=0;i<data.length;i++){
    sum+=data[i];
    if(i>=period)sum-=data[i-period];
    out.push(i>=period-1?sum/period:null);
  }
  return out;
}
function ema(data,period){
  const out=[];const k=2/(period+1);let prev=null;
  for(let i=0;i<data.length;i++){
    if(prev===null){
      if(i>=period-1){
        let s=0;for(let j=i-period+1;j<=i;j++)s+=data[j];
        prev=s/period;out.push(prev);
      }else out.push(null);
    }else{
      prev=data[i]*k+prev*(1-k);out.push(prev);
    }
  }
  return out;
}
function rsiCalc(closes,period=14){
  const out=Array(closes.length).fill(null);
  if(closes.length<period+1)return out;
  let avgG=0,avgL=0;
  for(let i=1;i<=period;i++){
    const d=closes[i]-closes[i-1];
    if(d>0)avgG+=d;else avgL-=d;
  }
  avgG/=period;avgL/=period;
  out[period]=avgL===0?100:100-100/(1+avgG/avgL);
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    const g=d>0?d:0,l=d<0?-d:0;
    avgG=(avgG*(period-1)+g)/period;
    avgL=(avgL*(period-1)+l)/period;
    out[i]=avgL===0?100:100-100/(1+avgG/avgL);
  }
  return out;
}
function stochRSI(closes,rsiP=14,stochP=14,kSmooth=3,dSmooth=3){
  const rsi=rsiCalc(closes,rsiP);
  const rawK=[];
  for(let i=0;i<rsi.length;i++){
    if(i<rsiP+stochP-1||rsi[i]===null){rawK.push(null);continue;}
    const slice=[];for(let j=i-stochP+1;j<=i;j++)if(rsi[j]!==null)slice.push(rsi[j]);
    if(slice.length<stochP){rawK.push(null);continue;}
    const lo=Math.min(...slice),hi=Math.max(...slice);
    rawK.push(hi===lo?50:(rsi[i]-lo)/(hi-lo)*100);
  }
  // Null-aware SMA smoothing
  function smaNA(arr,p){
    const out=[];
    for(let i=0;i<arr.length;i++){
      if(arr[i]===null){out.push(null);continue;}
      let sum=0,cnt=0;
      for(let j=Math.max(0,i-p+1);j<=i;j++)if(arr[j]!==null){sum+=arr[j];cnt++;}
      out.push(cnt>=p?sum/p:null);
    }
    return out;
  }
  const k=smaNA(rawK,kSmooth);
  const d=smaNA(k,dSmooth);
  return{k,d};
}
function macdCalc(closes,fast=12,slow=26,sig=9){
  const emaF=ema(closes,fast),emaS=ema(closes,slow);
  const line=[];
  for(let i=0;i<closes.length;i++){
    if(emaF[i]===null||emaS[i]===null)line.push(null);
    else line.push(emaF[i]-emaS[i]);
  }
  // Build signal from valid MACD values only
  const firstValid=line.findIndex(v=>v!==null);
  const validLine=line.map(v=>v!==null?v:0);
  const sigLine=ema(validLine,sig);
  const signal=[],hist=[];
  for(let i=0;i<closes.length;i++){
    if(line[i]===null||i<firstValid+sig-1){signal.push(null);hist.push(null);continue;}
    signal.push(sigLine[i]);
    hist.push(line[i]-sigLine[i]);
  }
  return{line,signal,hist};
}
function atrCalc(cArr,period=14){
  const out=Array(cArr.length).fill(null);
  if(cArr.length<2)return out;
  const trs=[];
  for(let i=1;i<cArr.length;i++){
    const h=cArr[i].h,l=cArr[i].l,pc=cArr[i-1].c;
    trs.push(Math.max(h-l,Math.abs(h-pc),Math.abs(l-pc)));
  }
  if(trs.length<period)return out;
  let atr=trs.slice(0,period).reduce((a,b)=>a+b,0)/period;
  out[period]=atr;
  for(let i=period;i<trs.length;i++){
    atr=(atr*(period-1)+trs[i])/period;
    out[i+1]=atr;
  }
  return out;
}
function bbands(closes,period=20,mult=2){
  const mid=sma(closes,period);
  const upper=[],lower=[];
  for(let i=0;i<closes.length;i++){
    if(mid[i]===null){upper.push(null);lower.push(null);continue;}
    let sum=0;for(let j=i-period+1;j<=i;j++)sum+=(closes[j]-mid[i])**2;
    const std=Math.sqrt(sum/period);
    upper.push(mid[i]+mult*std);lower.push(mid[i]-mult*std);
  }
  return{upper,lower,mid};
}
function detectCrosses(closes){
  const s50=sma(closes,50),s200=sma(closes,200);
  const signals=[];
  for(let i=1;i<closes.length;i++){
    if(s50[i]===null||s200[i]===null||s50[i-1]===null||s200[i-1]===null)continue;
    if(s50[i-1]<=s200[i-1]&&s50[i]>s200[i])signals.push({idx:i,price:s50[i],type:'golden'});
    if(s50[i-1]>=s200[i-1]&&s50[i]<s200[i])signals.push({idx:i,price:s50[i],type:'death'});
  }
  return signals;
}
function playAlarmSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const freqs=[523.25,659.25,783.99,1046.5];
    freqs.forEach((f,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type='sine';osc.frequency.value=f;
      gain.gain.setValueAtTime(0.15,ctx.currentTime+i*0.15);
      gain.gain.setTargetAtTime(0,ctx.currentTime+i*0.15+0.12,0.05);
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start(ctx.currentTime+i*0.15);osc.stop(ctx.currentTime+i*0.15+0.25);
    });
  }catch(e){console.warn('Audio not available',e);}
}

  const isIntra=['5m','1h','4h'].includes(currentTF);
  const range=vc.length;
  return [...vc.map((c,i)=>{

    }
    if(currentTF==='d1'){
      if(range>365)return c.t.toLocaleDateString('de-DE',{month:'short',year:'numeric'});
      if(range>120)return c.t.toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
      return c.t.toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});
    }
    return c.t.toLocaleDateString('de-DE',{month:'short',year:'numeric'});
  }),...Array(pads).fill('')];
}
function setView(s,e){
  viewStart=Math.max(0,Math.round(s));
  viewEnd=Math.max(viewStart+1,Math.round(e));
}
function ensureRightPad(){
  const vis=visCandles().length;
  const pad=Math.max(1,Math.round(vis*RIGHT_PAD));
  const minEnd=candles.length-1+pad;
  if(viewEnd<minEnd)viewEnd=minEnd;
}

// ── Y Range ───────────────────────────────────────────────────
function calcYRange(){
  const vc=visCandles();if(!vc.length)return{min:0,max:1};
  let lo=Math.min(...vc.map(c=>c.l)),hi=Math.max(...vc.map(c=>c.h));
  if(showBB){const cl=candles.map(c=>c.c);const{upper,lower}=bbands(cl,20,2);const vs=upper.slice(viewStart,viewStart+vc.length).filter(v=>v!=null);const vl=lower.slice(viewStart,viewStart+vc.length).filter(v=>v!=null);if(vs.length)hi=Math.max(hi,...vs);if(vl.length)lo=Math.min(lo,...vl);}
  const pad=(hi-lo)*0.06;return{min:lo-pad,max:hi+pad};
}
function getYRange(){return yOverride||calcYRange();}
function autoFitYFn(){yOverride=null;if(mainChart){const{min,max}=calcYRange();mainChart.options.scales.y.min=min;mainChart.options.scales.y.max=max;mainChart.update('none');}}

// ── Dynamic candle width ──────────────────────────────────────
// Returns the candle body width in pixels based on zoom level
function getCandleWidth(xScale){
  if(!xScale||viewTotal()<2)return 6;
  const px0=xScale.getPixelForValue(0);
  const px1=xScale.getPixelForValue(1);
  const slotWidth=Math.abs(px1-px0);
  // Fill 65% of slot, min 1.5px, max 20px
  return Math.min(20,Math.max(1.5,slotWidth*0.65));
}

// ── Volume Profile ────────────────────────────────────────────
function buildVolProfile(vc,yMin,yMax,buckets=24){
  const bucketSize=(yMax-yMin)/buckets;
  const profile=Array(buckets).fill(0);
  vc.forEach(c=>{const idx=Math.min(buckets-1,Math.max(0,Math.floor((c.c-yMin)/bucketSize)));profile[idx]+=(c.v||0);});
  const maxVol=Math.max(...profile);
  return{profile,bucketSize,maxVol};
}

// ── cpPlugin ──────────────────────────────────────────────────
const cpPlugin={
  id:'cp',
  beforeDatasetsDraw(chart){
    const{ctx,scales:{x,y},chartArea:ca}=chart;if(!x||!y||!ca)return;
    const vc=visCandles();
    const bw=getCandleWidth(x);
    // Vol Profile
    if(showVolProfile&&vc.length){
      const{profile,maxVol}=buildVolProfile(vc,y.min,y.max);
      const profileW=(ca.right-ca.left)*0.12;
      ctx.save();ctx.globalAlpha=.35;
      profile.forEach((v,i)=>{
        const barH=Math.max(1,(ca.bottom-ca.top)/profile.length-.5);
        const barW=maxVol>0?(v/maxVol)*profileW:0;
        const yTop=ca.bottom-(i+1)*(ca.bottom-ca.top)/profile.length;
        ctx.fillStyle='rgba(139,92,246,.6)';ctx.fillRect(ca.right-barW,yTop,barW,barH);
      });
      ctx.restore();
    }
    // Candles / Bars / Line
    vc.forEach((c,vi)=>{
      const xp=x.getPixelForValue(vi);
      const isUp=c.c>=c.o;const col=isUp?C.up:C.dn;
      ctx.save();
      if(chartType==='candles'){
        // Wick
        ctx.strokeStyle=C.wick;ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(xp,y.getPixelForValue(c.h));ctx.lineTo(xp,y.getPixelForValue(c.l));ctx.stroke();
        // Body
        ctx.fillStyle=col;
        const top=y.getPixelForValue(Math.max(c.o,c.c));
        ctx.fillRect(xp-bw/2,top,bw,Math.max(1,y.getPixelForValue(Math.min(c.o,c.c))-top));
      }else if(chartType==='bars'){
        const yH=y.getPixelForValue(c.h),yL=y.getPixelForValue(c.l),yO=y.getPixelForValue(c.o),yC=y.getPixelForValue(c.c);
        ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(xp,yH);ctx.lineTo(xp,yL);ctx.stroke();
        ctx.beginPath();ctx.moveTo(xp-bw/2,yO);ctx.lineTo(xp,yO);ctx.stroke();
        ctx.beginPath();ctx.moveTo(xp,yC);ctx.lineTo(xp+bw/2,yC);ctx.stroke();
      }
      ctx.restore();
    });
    // Padding
    const pads=paddingSlots();
    if(pads>0){
      const xPS=x.getPixelForValue(vc.length);
      ctx.save();ctx.fillStyle=C.padBg;ctx.fillRect(xPS,ca.top,ca.right-xPS,ca.bottom-ca.top);
      ctx.strokeStyle=C.padBorder;ctx.lineWidth=1;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(xPS,ca.top);ctx.lineTo(xPS,ca.bottom);ctx.stroke();
      ctx.restore();
    }
  },
  afterDatasetsDraw(chart){
    const{ctx,scales:{x,y},chartArea:ca}=chart;if(!x||!y||!ca)return;
    const closes=candles.map(c=>c.c);
    const vc=visCandles();
    // BB
    if(showBB){
      const{upper,lower,mid}=bbands(closes,20,2);
      const us=upper.slice(viewStart,viewStart+vc.length),ls=lower.slice(viewStart,viewStart+vc.length),ms=mid.slice(viewStart,viewStart+vc.length);
      ctx.save();ctx.beginPath();
      us.forEach((v,i)=>{if(v===null)return;const px=x.getPixelForValue(i),py=y.getPixelForValue(v);i===0||us[i-1]===null?ctx.moveTo(px,py):ctx.lineTo(px,py);});
      ls.slice().reverse().forEach((v,i,a)=>{const ri=a.length-1-i;if(v===null)return;const px=x.getPixelForValue(ri),py=y.getPixelForValue(v);ctx.lineTo(px,py);});
      ctx.closePath();ctx.fillStyle=C.bbFill;ctx.fill();ctx.restore();
      indLine(ctx,x,y,us,C.bbUpper,1,[]);indLine(ctx,x,y,ls,C.bbLower,1,[]);indLine(ctx,x,y,ms,C.bbMid,1,[3,3]);
    }
    // MAs
    if(showSMA200)indLine(ctx,x,y,sma(closes,200).slice(viewStart,viewStart+vc.length),C.sma200,1.8,[]);
    if(showSMA50) indLine(ctx,x,y,sma(closes,50).slice(viewStart,viewStart+vc.length), C.sma50, 1.5,[]);
    if(showEMA21) indLine(ctx,x,y,ema(closes,21).slice(viewStart,viewStart+vc.length), C.ema21, 1.5,[5,3]);
    // Golden/Death Cross markers
    if(showSMA50&&showSMA200){
      crossSignals.forEach(sig=>{
        const vi=sig.idx-viewStart;
        if(vi<0||vi>=vc.length)return;
        const xp=x.getPixelForValue(vi),yp=y.getPixelForValue(sig.price);
        const isGolden=sig.type==='golden';
        const col=isGolden?C.golden:C.death;
        const label=isGolden?'⭐ Golden Cross':'💀 Death Cross';
        ctx.save();
        // Circle marker
        ctx.strokeStyle=col;ctx.lineWidth=2;ctx.fillStyle=col+'33';
        ctx.beginPath();ctx.arc(xp,yp,10,0,Math.PI*2);ctx.fill();ctx.stroke();
        // Arrow
        ctx.fillStyle=col;ctx.font='700 10px system-ui';ctx.textAlign='center';
        ctx.fillText(isGolden?'▲':'▼',xp,yp+3.5);
        // Label above/below
        const lw=ctx.measureText(label).width+10;
        ctx.fillStyle='rgba(20,20,30,.85)';
        ctx.beginPath();ctx.roundRect(xp-lw/2,isGolden?yp-28:yp+14,lw,16,3);ctx.fill();
        ctx.fillStyle=col;ctx.fillText(label,xp,isGolden?yp-17:yp+25);
        ctx.textAlign='left';ctx.restore();
      });
    }
    // Last price line
    if(candles.length){
      const lp=candles[candles.length-1].c;
      const yp=y.getPixelForValue(lp);
      if(yp>=ca.top&&yp<=ca.bottom){
        ctx.save();ctx.strokeStyle=C.lastPrice;ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(ca.left,yp);ctx.lineTo(ca.right,yp);ctx.stroke();
        const bw2=52,bh=16;
        ctx.fillStyle=C.lastPrice;ctx.setLineDash([]);
        ctx.beginPath();ctx.roundRect(ca.right+1,yp-bh/2,bw2,bh,3);ctx.fill();
        ctx.fillStyle='#000';ctx.font='700 10px system-ui';ctx.textAlign='center';
        ctx.fillText(fmtPrice(lp),ca.right+1+bw2/2,yp+3.5);ctx.textAlign='left';
        ctx.restore();
      }
    }
    // Alarm lines
    alarms.filter(a=>a.sym===currentSymbol).forEach(a=>{
      const yp=y.getPixelForValue(a.price);
      const isSel=selectedDrawing&&selectedDrawing.pool==='alarms'&&selectedDrawing.id===a.id;
      if(isSel){ctx.save();ctx.strokeStyle='rgba(255,224,102,.25)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(ca.left,yp);ctx.lineTo(ca.right,yp);ctx.stroke();ctx.restore();}
      ctx.save();ctx.strokeStyle=isSel?'#ffe066':C.alarm;ctx.lineWidth=isSel?2:1;ctx.setLineDash([5,3]);
      ctx.beginPath();ctx.moveTo(ca.left,yp);ctx.lineTo(ca.right,yp);ctx.stroke();
      ctx.setLineDash([]);ctx.fillStyle=isSel?'#ffe066':C.alarm;ctx.font='10px system-ui';
      const label='⚡ '+(a.dir==='above'?'▲':'▼')+' '+fmtPrice(a.price);
      ctx.fillText(label,ca.right-100,yp-4);
      if(isSel){ctx.fillStyle='rgba(255,224,102,.9)';ctx.font='bold 10px system-ui';ctx.fillText('← Entf zum Löschen',ca.left+6,yp-4);}
      ctx.restore();
    });
    setTimeout(redrawOC,0);
  }
};

function makeLiveLabelPlugin(dsIdx,colorFn,fmtFn){
  return{id:'ll_'+dsIdx,afterDatasetsDraw(chart){
    const{ctx,scales:{y},chartArea:ca}=chart;if(!ca)return;
    const vals=chart.data.datasets[dsIdx].data.filter(v=>v!=null);if(!vals.length)return;
    const lv=vals[vals.length-1];const col=colorFn(lv);const yp=y.getPixelForValue(lv);
    if(yp<ca.top||yp>ca.bottom)return;
    const txt=fmtFn(lv);const bw=txt.length*6+10,bh=16;
    ctx.save();ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(ca.right+1,yp-bh/2,bw,bh,3);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='700 10px system-ui';ctx.textAlign='center';
    ctx.fillText(txt,ca.right+1+bw/2,yp+3.5);ctx.textAlign='left';ctx.restore();
  }};
}

function indLine(ctx,x,y,data,col,w,dash){
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=w;ctx.setLineDash(dash);
  ctx.beginPath();let s=false;
  data.forEach((v,i)=>{if(v===null){s=false;return;}const px=x.getPixelForValue(i),py=y.getPixelForValue(v);if(!s){ctx.moveTo(px,py);s=true;}else ctx.lineTo(px,py);});
  ctx.stroke();ctx.restore();
}

// ── Create charts ─────────────────────────────────────────────
function renderAll(){
  if(!candles.length)return;
  const last=candles[candles.length-1];
  const prev=candles.length>1?candles[candles.length-2]:last;
  const chg=last.c-prev.c,pct=prev.c>0?chg/prev.c*100:0;
  const symName=getSymName(currentSymbol);
  document.getElementById('sym-lbl').textContent=currentSymbol+(symName?' · '+symName:'');
  document.getElementById('cur-price').textContent=fmtPrice(last.c);
  const ce=document.getElementById('price-chg');
  ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+' ('+(chg>=0?'+':'')+pct.toFixed(2)+'%)';
  ce.className=chg>=0?'up':'dn';
  document.getElementById('ohlc').textContent='O:'+last.o?.toFixed(2)+' H:'+last.h?.toFixed(2)+' L:'+last.l?.toFixed(2)+' C:'+last.c?.toFixed(2);
  document.getElementById('al-sym').textContent=currentSymbol;
  // Detect crosses for visible range
  crossSignals=detectCrosses(candles.map(c=>c.c));
  createCharts();syncOC();setTimeout(redrawOC,60);
  // Update watchlist active state
  document.querySelectorAll('.wl-item').forEach(el=>{el.classList.toggle('active',el.dataset.sym===currentSymbol);});
}

      }});
  }

// Convert index → timestamp (ms)
function idxToTime(idx){
  if(idx>=0&&idx<candles.length)return candles[idx].t.getTime();
  // Extrapolate: for indices beyond candles, use last candle time + N*tf_ms
  const tfMs={'5m':300000,'1h':3600000,'4h':14400000,d1:86400000,m1:2592000000}[currentTF]||86400000;
  if(!candles.length)return 0;
  const last=candles[candles.length-1].t.getTime();
  if(idx>=candles.length)return last+(idx-(candles.length-1))*tfMs;
  return candles[0].t.getTime()-(-idx)*tfMs;
}
// Convert timestamp (ms) → nearest index (may be fractional for accuracy)
function timeToIdx(ms){
  if(!candles.length)return 0;
  // Binary search nearest candle
  let lo=0,hi=candles.length-1;
  const first=candles[0].t.getTime(),last=candles[hi].t.getTime();
  if(ms<=first)return 0;
  if(ms>=last){
    // Extrapolate forward
    const tfMs={'5m':300000,'1h':3600000,'4h':14400000,d1:86400000,m1:2592000000}[currentTF]||86400000;
    return hi+(ms-last)/tfMs;
  }
  while(lo<hi-1){
    const mid=(lo+hi)>>1;
    if(candles[mid].t.getTime()<=ms)lo=mid;else hi=mid;
  }
  // Linear interpolate between lo and hi
  const tLo=candles[lo].t.getTime(),tHi=candles[hi].t.getTime();
  if(tHi===tLo)return lo;
  return lo+(ms-tLo)/(tHi-tLo);
}

function resolvePoint(p){
  if(p.time!=null)return{idx:timeToIdx(p.time),price:p.price};

}

}

function drawFibLevels(ctx,ca,price1,price2,x1,x2,yScale){

// ── Drawing hit-test ──────────────────────────────────────────
function ptLineDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
  if(len2===0)return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/len2));
  return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}
function hitTestDrawing(d,rx,ry,ca){
  if(!mainChart)return false;
  const{scales:{x,y}}=mainChart;
  const HIT=8;
  const rp1=d.p1?resolvePoint(d.p1):null;
  const rp2=d.p2?resolvePoint(d.p2):null;
  if(d.type==='trendline'){
    if(!rp1||!rp2)return false;
    const p1=idxToPx(rp1.idx,rp1.price),p2=idxToPx(rp2.idx,rp2.price);
    if(!p1||!p2)return false;
    const ext=extLine(p1.x,p1.y,p2.x,p2.y,ca.left,ca.right);
    return ptLineDist(rx,ry,ext.x1,ext.y1,ext.x2,ext.y2)<HIT;
  }
  if(d.type==='support'){
    const yp=y.getPixelForValue(d.price);
    let xFrom=ca.left;
    if(!d.full&&!d.ai){
      let sIdx=d.startIdx;
      if(d.time!=null)sIdx=timeToIdx(d.time);
      if(sIdx!=null){const vi=sIdx-viewStart;const px2=x.getPixelForValue(vi);if(px2>=ca.left&&px2<=ca.right)xFrom=px2;}
    }
    return Math.abs(ry-yp)<HIT && rx>=xFrom && rx<=ca.right;
  }
  if(d.type==='channel'){
    if(!rp1||!rp2)return false;
    const p1=idxToPx(rp1.idx,rp1.price),p2=idxToPx(rp2.idx,rp2.price);
    if(!p1||!p2)return false;
    const offsetY=d.offsetPrice!=null?(y.getPixelForValue(rp1.price+d.offsetPrice)-p1.y):d.offsetPx;
    const e1=extLine(p1.x,p1.y,p2.x,p2.y,ca.left,ca.right);
    const e2=extLine(p1.x,p1.y+offsetY,p2.x,p2.y+offsetY,ca.left,ca.right);
    return ptLineDist(rx,ry,e1.x1,e1.y1,e1.x2,e1.y2)<HIT ||
           ptLineDist(rx,ry,e2.x1,e2.y1,e2.x2,e2.y2)<HIT;
  }
  if(d.type==='fib'){
    if(!rp1||!rp2)return false;
    const p1=idxToPx(rp1.idx,rp1.price),p2=idxToPx(rp2.idx,rp2.price);
    if(!p1||!p2)return false;
    return FIB_LEVELS.some(lvl=>{
      const price=rp1.price+(rp2.price-rp1.price)*lvl;
      return Math.abs(ry-y.getPixelForValue(price))<HIT;
    });
  }
  return false;
}
function findDrawingAtPoint(rx,ry,ca){
  // Check alarms (horizontal lines)
  if(mainChart){
    const y=mainChart.scales.y;
    const activeAlarms=alarms.filter(a=>a.sym===currentSymbol);
    for(let i=activeAlarms.length-1;i>=0;i--){
      const a=activeAlarms[i];
      const yp=y.getPixelForValue(a.price);
      if(Math.abs(ry-yp)<8&&rx>=ca.left&&rx<=ca.right){
        return{pool:'alarms',idx:alarms.indexOf(a),id:a.id};
      }
    }
  }
  // Check manual drawings — nur für aktuelles Symbol
  for(let i=drawings.length-1;i>=0;i--){
    const d=drawings[i];
    if(d.sym&&d.sym!==currentSymbol)continue;
    if(hitTestDrawing(d,rx,ry,ca))return{pool:'drawings',idx:i,id:d.id};
  }
  for(let i=aiDrawings.length-1;i>=0;i--){
    const d=aiDrawings[i];
    if(d.sym&&d.sym!==currentSymbol)continue;
    if(hitTestDrawing(d,rx,ry,ca))return{pool:'aiDrawings',idx:i,id:d.id};
  }
  return null;
}

function drawObj(ctx,d,ca){
  if(!mainChart)return;const{scales:{y}}=mainChart;
  const isAI=d.ai;
  const isSel=selectedDrawing&&selectedDrawing.id===d.id;

  if(d.type==='trendline'){

    const col=isAI?C.aiTrend:C.trend;
    const ext=extLine(p1.x,p1.y,p2.x,p2.y,ca.left,ca.right);
    if(isSel){ctx.save();ctx.strokeStyle='rgba(255,255,100,.25)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(ext.x1,ext.y1);ctx.lineTo(ext.x2,ext.y2);ctx.stroke();ctx.restore();}
    dline(ctx,ext.x1,ext.y1,ext.x2,ext.y2,isSel?'#ffe066':col,isSel?2:isAI?1.2:1.5,isAI&&!isSel?[6,3]:[]);
    dpt(ctx,p1.x,p1.y,isSel?'#ffe066':col);dpt(ctx,p2.x,p2.y,isSel?'#ffe066':col);
    if(isAI&&d.label){ctx.save();ctx.fillStyle=col;ctx.font='10px system-ui';ctx.fillText(d.label,ext.x1+8,ext.y1-5);ctx.restore();}
    if(isSel){trashX=p2.x;trashY=p2.y;}
  }else if(d.type==='channel'){
    if(!rp1||!rp2)return;
    const p1=idxToPx(rp1.idx,rp1.price),p2=idxToPx(rp2.idx,rp2.price);if(!p1||!p2)return;
    // Use offsetPrice if available (stable across timeframes), fallback to offsetPx
    const offsetY=d.offsetPrice!=null?(y.getPixelForValue(rp1.price+d.offsetPrice)-p1.y):d.offsetPx;
    const e1=extLine(p1.x,p1.y,p2.x,p2.y,ca.left,ca.right);
    const e2=extLine(p1.x,p1.y+offsetY,p2.x,p2.y+offsetY,ca.left,ca.right);
    ctx.save();ctx.beginPath();ctx.moveTo(e1.x1,e1.y1);ctx.lineTo(e1.x2,e1.y2);ctx.lineTo(e2.x2,e2.y2);ctx.lineTo(e2.x1,e2.y1);ctx.closePath();ctx.fillStyle=isSel?'rgba(255,224,102,.1)':C.chanFill;ctx.fill();ctx.restore();
    dline(ctx,e1.x1,e1.y1,e1.x2,e1.y2,isSel?'#ffe066':C.chan,1.5,[]);
    dline(ctx,e2.x1,e2.y1,e2.x2,e2.y2,isSel?'#ffe066':C.chan,1,[5,3]);
    if(isSel){trashX=p2.x;trashY=p2.y;}
  }else if(d.type==='support'){
    const yp=y.getPixelForValue(d.price);const last=candles[candles.length-1];
    const col=isAI?C.aiSupport:(d.price>=last.c?C.resist:C.support);
    let xFrom=ca.left;
    if(!d.full&&!isAI){
      let sIdx=d.startIdx;
      if(d.time!=null)sIdx=timeToIdx(d.time);
      if(sIdx!=null){const vi=sIdx-viewStart;if(mainChart){const px=mainChart.scales.x.getPixelForValue(vi);if(px>=ca.left&&px<=ca.right)xFrom=px;}}
    }
    if(isSel){ctx.save();ctx.strokeStyle='rgba(255,255,100,.25)';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(xFrom,yp);ctx.lineTo(ca.right,yp);ctx.stroke();ctx.restore();}
    dline(ctx,xFrom,yp,ca.right,yp,isSel?'#ffe066':col,isAI?1:1.5,[]);
    ctx.fillStyle=isSel?'#ffe066':col;ctx.font=(isAI?'':'500 ')+'10px system-ui';
    const lbl=isAI?d.label:(d.price>=last.c?'R':'S')+' '+fmtPrice(d.price);
    ctx.fillText(lbl,xFrom+6,yp-4);
    if(isSel){trashX=ca.right-10;trashY=yp;}
  }else if(d.type==='fib'){
    if(!rp1||!rp2)return;
    const p1=idxToPx(rp1.idx,rp1.price),p2=idxToPx(rp2.idx,rp2.price);if(!p1||!p2)return;
    drawFibLevels(ctx,ca,rp1.price,rp2.price,p1.x,p2.x,p=>y.getPixelForValue(p));
    if(isSel){trashX=p2.x;trashY=p2.y;}
  }
  // Draw trash icon near the drawing if selected
  if(isSel&&trashX!=null&&trashY!=null){
    drawTrashIcon(ctx,trashX+14,trashY-14,d.id);
  }
}

let trashZones=[];
function drawTrashIcon(ctx,cx,cy,id){
  // Draw circle background
  ctx.save();
  ctx.fillStyle='rgba(239,83,80,.95)';
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,11,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Trash emoji
  ctx.fillStyle='#fff';ctx.font='bold 13px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🗑',cx,cy);
  ctx.restore();
  trashZones.push({cx,cy,r:13,id});
}
function dline(ctx,x1,y1,x2,y2,col,w,dash){ctx.save();ctx.strokeStyle=col;ctx.lineWidth=w;ctx.setLineDash(dash||[]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore();}
function dpt(ctx,x,y,col){ctx.save();ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();ctx.restore();}
function extLine(x1,y1,x2,y2,xL,xR){if(x1===x2)return{x1,y1:y1-9999,x2,y2:y2+9999};const s=(y2-y1)/(x2-x1);return{x1:xL,y1:y1+s*(xL-x1),x2:xR,y2:y1+s*(xR-x1)};}

async function runAIAnalysis(){
  let provider=getAIProvider();
  let apiKey=getApiKey(provider);

  // If no key stored, prompt user
  if(!apiKey){
    const choice=prompt('KI-Analyse — Anbieter wählen:\n\n1 = Google Gemini (kostenlos) — aistudio.google.com\n2 = Anthropic Claude (kostenpflichtig)\n\nNummer eingeben:','1');

    apiKey=prompt(keyPrompt);
    if(!apiKey||apiKey.trim().length<10){setStatus('⚠️ Kein gültiger API-Key eingegeben.','err');return;}

  if(!candles.length){setStatus('KI: Keine Daten geladen.','err');return;}

  const provLabel=provider==='gemini'?'Gemini':'Claude';
  setStatus('✦ KI-Analyse via '+provLabel+' — '+currentSymbol+'…','ai');
  const N=Math.min(120,candles.length);
  const slice=candles.slice(candles.length-N);
  const ohlcData=slice.map((c,i)=>({i:candles.length-N+i,o:+c.o.toFixed(2),h:+c.h.toFixed(2),l:+c.l.toFixed(2),c:+c.c.toFixed(2)}));
  const aiPrompt=`Du bist ein professioneller technischer Analyst. Analysiere diese ${N} OHLC-Kerzen für ${currentSymbol} im ${currentTF.toUpperCase()}-Zeitrahmen.

Identifiziere:
1. Bis zu 3 wichtige Trendlinien (Aufwärts- oder Abwärtstrend) — wähle Punkte die an Hochs/Tiefs liegen
2. Bis zu 4 horizontale Support/Resistanz-Niveaus — wichtige Preis-Bereiche
3. Ein Fibonacci-Retracement vom letzten markanten Swing High zu Swing Low

OHLC-Daten (i=Index, o=Open, h=High, l=Low, c=Close):
${JSON.stringify(ohlcData)}

Antworte NUR mit validem JSON, KEIN Text, KEINE Erklärung:
{"trendlines":[{"p1_idx":<int>,"p1_price":<float>,"p2_idx":<int>,"p2_price":<float>,"label":"<Aufwärtstrend|Abwärtstrend>"}],"support_resistance":[{"price":<float>,"label":"<Support|Resistanz> $<preis>","type":"<support|resistance>"}],"fibonacci":{"p1_idx":<int>,"p1_price":<float>,"p2_idx":<int>,"p2_price":<float>}}`;

  try{
    let raw='';
    if(provider==='gemini'){
      // Google Gemini API (free) — try flash-lite first (higher quota), then flash
      const models=['gemini-2.5-flash-preview-04-17','gemini-2.0-flash-lite','gemini-2.0-flash','gemini-1.5-flash-8b','gemini-1.5-flash'];
      let lastErr='';
      for(const model of models){
        try{
          const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
          const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({contents:[{parts:[{text:aiPrompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:800}})});
          if(resp.ok){
            const data=await resp.json();
            raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
            if(raw)break;
          }else{
            lastErr=resp.status+' '+model;
            if(resp.status===401||resp.status===403){
              localStorage.removeItem('chartpro_gemini_key');
              const newKey=prompt('Gemini Key ungültig ('+resp.status+').\n\nNeuen API-Key eingeben:');
              if(newKey&&newKey.trim().length>=10){setApiKey('gemini',newKey.trim());setStatus('Neuer Key gespeichert — nochmal versuchen.','ok');}
              throw new Error('Key ungültig');
            }
            if(resp.status===429){continue;} // Try next model
          }
        }catch(e){if(e.message==='Key ungültig')throw e;}
      }
      if(!raw)throw new Error('Gemini Quota erschöpft ('+lastErr+'). Warte 1 Min oder nutze neuen Google-Account.');
    }else{
      // Anthropic Claude API (needs CORS proxy from browser)
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:aiPrompt}]})});
      if(!resp.ok){
        if(resp.status===401||resp.status===403){
          localStorage.removeItem('chartpro_anthropic_key');
          throw new Error('Claude Key ungültig ('+resp.status+'). Klicke nochmal für neuen Key.');
        }
        throw new Error('Claude Fehler: '+resp.status);
      }
      const data=await resp.json();raw=data.content?.[0]?.text||'';
    }
    const jsonStr=raw.replace(/```json|```/g,'').trim();
    const result=JSON.parse(jsonStr);
    aiDrawings=[];
    (result.trendlines||[]).forEach(t=>{
      aiDrawings.push({type:'trendline',p1:{idx:t.p1_idx,price:t.p1_price},p2:{idx:t.p2_idx,price:t.p2_price},label:t.label,ai:true,id:Date.now()+Math.random(),sym:currentSymbol});
    });
    (result.support_resistance||[]).forEach(s=>{
      aiDrawings.push({type:'support',price:s.price,label:s.label,full:true,ai:true,id:Date.now()+Math.random(),sym:currentSymbol});
    });
    if(result.fibonacci){
      const f=result.fibonacci;
      aiDrawings.push({type:'fib',p1:{idx:f.p1_idx,price:f.p1_price},p2:{idx:f.p2_idx,price:f.p2_price},ai:true,id:Date.now()+Math.random(),sym:currentSymbol});
    }
    redrawOC();
    const hint=document.getElementById('ai-hint');
    hint.textContent='✦ '+provLabel+': '+(result.trendlines?.length||0)+' Trends · '+(result.support_resistance?.length||0)+' S/R · Fib';
    hint.style.display='inline';
    setStatus('✦ KI-Analyse ('+provLabel+') abgeschlossen — '+aiDrawings.length+' Zeichnungen','ok');
    setTimeout(()=>setStatus('Bereit','idle'),3000);
  }catch(e){
    setStatus('KI-Fehler: '+e.message,'err');console.error(e);
    setTimeout(()=>setStatus('Bereit','idle'),5000);
  }finally{
    btn.classList.remove('loading');btn.textContent='✦ KI-Analyse';
  }
}

function getPanelChart(k){return{vol:volChart,rsi:rsiChart,srsi:srsiChart,macd:macdChart,atr:atrChart}[k];}

function syncPanelOCs(){
  const drawActive=drawMode==='support'||drawMode==='supportfull'||drawMode==='trendline';
  PANEL_KEYS.forEach(k=>{
    const oc=document.getElementById(k+'-ov');
    const canvas=document.getElementById(k+'-canvas');

    oc.style.cursor=drawActive?'crosshair':'default';
  });
}

function redrawPanelOC(k){
  const oc=document.getElementById(k+'-ov');
  const chart=getPanelChart(k);
  if(!oc||!chart)return;
  const ctx=oc.getContext('2d');
  ctx.clearRect(0,0,oc.width,oc.height);
  const ca=chart.chartArea;if(!ca)return;
  const{scales:{x,y}}=chart;
  ctx.save();ctx.beginPath();ctx.rect(ca.left,ca.top,ca.right-ca.left,ca.bottom-ca.top);ctx.clip();
  const COL='rgba(180,160,255,.95)';
  (panelDrawings[k]||[]).forEach(d=>{
    if(d.type==='hline'){
      const yp=y.getPixelForValue(d.value);
      ctx.save();ctx.strokeStyle=COL;ctx.lineWidth=1;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(d.full?ca.left:x.getPixelForValue(d.vi-viewStart),yp);ctx.lineTo(ca.right,yp);ctx.stroke();
      ctx.fillStyle=COL;ctx.font='10px system-ui';
      ctx.fillText(d.label||d.value.toFixed(2),(d.full?ca.left:x.getPixelForValue(d.vi-viewStart))+6,yp-3);
      ctx.restore();
    }else if(d.type==='trendline'){
      const vi1=d.p1.idx-viewStart,vi2=d.p2.idx-viewStart;
      const x1=x.getPixelForValue(vi1),y1=y.getPixelForValue(d.p1.value);
      const x2=x.getPixelForValue(vi2),y2=y.getPixelForValue(d.p2.value);
      const ext=extLine(x1,y1,x2,y2,ca.left,ca.right);
      ctx.save();ctx.strokeStyle=COL;ctx.lineWidth=1.5;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(ext.x1,ext.y1);ctx.lineTo(ext.x2,ext.y2);ctx.stroke();
      dpt(ctx,x1,y1,COL);dpt(ctx,x2,y2,COL);ctx.restore();
    }
  });
  // Preview
  const mp=panelMouse[k];
  if(mp&&mp.inChart){
    ctx.save();ctx.globalAlpha=.6;ctx.strokeStyle=COL;ctx.fillStyle=COL;ctx.font='10px system-ui';
    if(drawMode==='support'||drawMode==='supportfull'){
      const xFrom=drawMode==='supportfull'?ca.left:x.getPixelForValue(mp.vi);
      ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(xFrom,mp.ry);ctx.lineTo(ca.right,mp.ry);ctx.stroke();
      ctx.fillText(mp.value.toFixed(2),xFrom+6,mp.ry-3);
    }
    if(drawMode==='trendline'&&(panelStep[k]||0)===1&&panelTemp[k]){
      const x1p=x.getPixelForValue(panelTemp[k].idx-viewStart),y1p=y.getPixelForValue(panelTemp[k].value);
      ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x1p,y1p);ctx.lineTo(mp.rx,mp.ry);ctx.stroke();
      dpt(ctx,x1p,y1p,COL);
    }
    ctx.restore();
  }
  ctx.restore();
}

function redrawAllPanelOCs(){PANEL_KEYS.forEach(k=>redrawPanelOC(k));}

function initPanelOverlays(){
  PANEL_KEYS.forEach(k=>{
    const oc=document.getElementById(k+'-ov');
    if(!oc||oc._init)return;
    oc._init=true;
    oc.addEventListener('mousemove',e=>{
      const chart=getPanelChart(k);if(!chart)return;

      const rx=e.clientX-rect.left,ry=e.clientY-rect.top;
      const ca=chart.chartArea;if(!ca)return;
      const inChart=rx>=ca.left&&rx<=ca.right&&ry>=ca.top&&ry<=ca.bottom;
      const value=chart.scales.y.getValueForPixel(ry);
      const vi=Math.max(0,Math.min(Math.round(chart.scales.x.getValueForPixel(rx)),viewTotal()-1));
      panelMouse[k]={rx,ry,value,vi,inChart};redrawPanelOC(k);
    });
    oc.addEventListener('mouseleave',()=>{delete panelMouse[k];redrawPanelOC(k);});
    oc.addEventListener('contextmenu',e=>{e.preventDefault();setDrawMode('pointer');});
    oc.addEventListener('click',e=>{
      const chart=getPanelChart(k);if(!chart)return;
      const rect=oc.getBoundingClientRect();
      const rx=e.clientX-rect.left,ry=e.clientY-rect.top;
      const ca=chart.chartArea;if(!ca)return;
      if(rx<ca.left||rx>ca.right||ry<ca.top||ry>ca.bottom)return;
      const value=chart.scales.y.getValueForPixel(ry);
      const vi=Math.max(0,Math.min(Math.round(chart.scales.x.getValueForPixel(rx)),viewTotal()-1));
      const fullIdx=viewStart+vi;
      if(drawMode==='support'||drawMode==='supportfull'){
        panelDrawings[k].push({type:'hline',value,vi:fullIdx,full:drawMode==='supportfull',label:value.toFixed(2),id:Date.now()});
        redrawPanelOC(k);
      }else if(drawMode==='trendline'){
        if(!panelStep[k]){panelTemp[k]={idx:fullIdx,value};panelStep[k]=1;}
        else{
          panelDrawings[k].push({type:'trendline',p1:panelTemp[k],p2:{idx:fullIdx,value},id:Date.now()});
          panelTemp[k]=null;panelStep[k]=0;redrawPanelOC(k);
        }
      }
    });
  });
  syncPanelOCs();
}

  if(yDragging&&mainChart){const dy=e.clientY-yDragStartY;const range=yDragMaxStart-yDragMinStart;const mid=(yDragMaxStart+yDragMinStart)/2;const newRange=range*(1+dy/200);yOverride={min:mid-newRange/2,max:mid+newRange/2};mainChart.options.scales.y.min=yOverride.min;mainChart.options.scales.y.max=yOverride.max;mainChart.update('none');return;}
  if(!isDragging)return;

    const chartH=mainChart.chartArea.bottom-mainChart.chartArea.top;
    const priceRange=dragYMax-dragYMin;

  }

  if(ca&&ry>ca.bottom&&rx>=ca.left&&rx<=ca.right&&drawMode==='pointer'){
    viewStart=0;viewEnd=candles.length-1;ensureRightPad();yOverride=null;updateView();
    setStatus('Alle Kerzen','ok');setTimeout(()=>setStatus('Bereit','idle'),1500);return;
  }
  if(!pos||!pos.inChart)return;
  // In pointer mode: select/deselect drawings
  if(drawMode==='pointer'){
    const ca=mainChart?.chartArea;
    if(!ca)return;
    // Check if user clicked on a trash icon first
    if(selectedDrawing&&trashZones.length){
      for(const tz of trashZones){
        if(Math.hypot(pos.rx-tz.cx,pos.ry-tz.cy)<=tz.r){
          deleteSelectedDrawing();
          return;
        }
      }
    }
    const hit=findDrawingAtPoint(pos.rx,pos.ry,ca);
    const delBtn=document.getElementById('del-selected-btn');
    if(hit){
      selectedDrawing=hit;
      if(delBtn)delBtn.style.display='';
      setStatus('Ausgewählt — 🗑 klicken oder Entf drücken','idle');
    }else{
      selectedDrawing=null;
      if(delBtn)delBtn.style.display='none';
    }
    redrawOC();
    return;
  }
  const sp=snapPoint;const useIdx=sp?sp.idx:pos.idx,usePrice=sp?sp.price:pos.price;const usePx=sp?{x:sp.px,y:sp.py}:{x:pos.rx,y:pos.ry};
  if(drawMode==='alarm'){
    // Auto-detect direction: above or below current price
    const cur=candles[candles.length-1]?.c||0;
    const dir=pos.price>=cur?'above':'below';
    addAlarm(pos.price,dir);
    renderAll();
    return;
  }
  if(drawMode==='support'||drawMode==='supportfull'){const d={type:'support',price:usePrice,startIdx:useIdx,time:idxToTime(useIdx),full:drawMode==='supportfull',id:Date.now(),sym:currentSymbol};drawings.push(d);cloudAddDrawing(d);redrawOC();return;}
  if(drawMode==='trendline'){if(drawStep===0){drawTemp=[{idx:useIdx,price:usePrice,time:idxToTime(useIdx)}];drawStep=1;}else{const d={type:'trendline',p1:drawTemp[0],p2:{idx:useIdx,price:usePrice,time:idxToTime(useIdx)},id:Date.now(),sym:currentSymbol};drawings.push(d);cloudAddDrawing(d);drawTemp=null;drawStep=0;redrawOC();}return;}
  if(drawMode==='channel'){if(drawStep===0){drawTemp=[{idx:useIdx,price:usePrice,time:idxToTime(useIdx)}];drawStep=1;}else if(drawStep===1){drawTemp.push({idx:useIdx,price:usePrice,time:idxToTime(useIdx)});drawStep=2;}else{const p1=idxToPx(drawTemp[0].idx,drawTemp[0].price),p2=idxToPx(drawTemp[1].idx,drawTemp[1].price);if(p1&&p2){const d={type:'channel',p1:drawTemp[0],p2:drawTemp[1],offsetPx:usePx.y-(p1.y+p2.y)/2,offsetPrice:usePrice-((drawTemp[0].price+drawTemp[1].price)/2),id:Date.now(),sym:currentSymbol};drawings.push(d);cloudAddDrawing(d);}drawTemp=null;drawStep=0;redrawOC();}return;}
  if(drawMode==='fib'){if(drawStep===0){drawTemp=[{idx:useIdx,price:usePrice,time:idxToTime(useIdx)}];drawStep=1;}else{const d={type:'fib',p1:drawTemp[0],p2:{idx:useIdx,price:usePrice,time:idxToTime(useIdx)},id:Date.now(),sym:currentSymbol};drawings.push(d);cloudAddDrawing(d);drawTemp=null;drawStep=0;redrawOC();}return;}
});

function showPopup(alarm){
  document.getElementById('pop-body').textContent=alarm.sym+' ist '+(alarm.dir==='above'?'über':'unter')+' '+getCurrency(alarm.sym)+alarm.price.toFixed(2);
  document.getElementById('pop-meta').textContent=new Date().toLocaleString('de-DE');
  const bar=document.getElementById('pop-bar');bar.style.animation='none';requestAnimationFrame(()=>requestAnimationFrame(()=>{bar.style.animation='barDown 8s linear forwards';}));
  document.getElementById('al-popup').style.display='flex';
  if(popupTimer)clearTimeout(popupTimer);popupTimer=setTimeout(()=>document.getElementById('al-popup').style.display='none',8000);
}
document.getElementById('pop-close').addEventListener('click',()=>{document.getElementById('al-popup').style.display='none';if(popupTimer)clearTimeout(popupTimer);});
function addAlarm(price,dir){
  if(isNaN(price)||price<=0)return;
  // Duplicate protection: ignore if same symbol+price+dir added in last 2s
  const now=Date.now();
  const dup=alarms.find(a=>a.sym===currentSymbol&&Math.abs(a.price-price)<0.01&&a.dir===dir&&(now-a.id)<2000);
  if(dup){setStatus('⚠ Alarm schon gesetzt','err');return;}
  alarms.push({price,dir,sym:currentSymbol,id:now});
  renderAlarmTags();
  if(!alarmInterval)alarmInterval=setInterval(checkAlarms,8000);
  // Always push to cloud if email is set
  if(localStorage.getItem('zen_alarm_email')){
    cloudAddAlarm(currentSymbol,dir,price);
  }
}
function renderAlarmTags(){
  const el=document.getElementById('al-list');
  el.innerHTML=alarms.map(a=>`<div class="al-tag">${a.sym} ${a.dir==='above'?'▲':'▼'} ${getCurrency(a.sym)}${a.price.toFixed(2)}<span class="al-x" data-id="${a.id}">✕</span></div>`).join('');
  el.querySelectorAll('.al-x').forEach(b=>b.addEventListener('click',()=>{alarms=alarms.filter(a=>a.id!=b.dataset.id);renderAlarmTags();renderAll();redrawOC();}));
}
function checkAlarms(){
  if(!candles.length)return;
  const cur=candles[candles.length-1].c;
  const triggeredIds=[];
  alarms.forEach(a=>{
    if(a.sym!==currentSymbol)return;
    if((a.dir==='above'&&cur>=a.price)||(a.dir==='below'&&cur<=a.price)){
      if(!a.triggered){
        a.triggered=true;
        playAlarmSound();
        showPopup(a);
        const cur2=getCurrency(a.sym);
        setStatus('⚡ Alarm: '+a.sym+' '+(a.dir==='above'?'über':'unter')+' '+cur2+a.price.toFixed(2),'err');
        if(Notification.permission==='granted')new Notification(a.sym+' Alarm',{body:(a.dir==='above'?'Über':'Unter')+' '+cur2+a.price.toFixed(2)});
        else if(Notification.permission!=='denied')Notification.requestPermission();
        sendAlarmEmail(a);
        // Cloud: mark as triggered (will be auto-removed on next check)
        if(localStorage.getItem('zen_alarm_email')){cloudDeleteAlarm(a.sym,a.price);}
        triggeredIds.push(a.id);
      }
    }
  });
  // Auto-remove triggered alarms from chart (like TradingView)
  if(triggeredIds.length){
    setTimeout(()=>{
      alarms=alarms.filter(a=>!triggeredIds.includes(a.id));
      renderAlarmTags();
      redrawOC();
    },2000); // 2s delay so user sees the alarm line briefly
  }
}
async function cloudDeleteAlarm(sym,price){
  try{
    await fetch(CLOUD_WEBHOOK_URL,{
      method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'delete',symbol:sym,price})
    });
  }catch{}
}

let rsiAlarmInterval=null;
let rsiAlarmState={}; // { "AAPL": "overbought"|"oversold"|"neutral" }
function loadRsiAlarmState(){
  try{
    rsiAlarmState=JSON.parse(localStorage.getItem('zen_rsiAlarmState')||'{}');
    const enabled=localStorage.getItem('zen_rsiAlarmEnabled')==='1';
    document.getElementById('al-rsi-enabled').checked=enabled;
    if(enabled)startRsiAlarms();
  }catch{}
}
function saveRsiAlarmState(){try{localStorage.setItem('zen_rsiAlarmState',JSON.stringify(rsiAlarmState));}catch{}}
async function checkRsiAlarms(){
  const statusEl=document.getElementById('al-rsi-status');
  if(!watchlist.length){statusEl.textContent='Watchlist leer';return;}
  statusEl.textContent='Prüfe RSI…';
  for(const sym of watchlist){
    try{
      const res=await loadCandles(sym,'d1');
      if(!res||res.candles.length<30)continue;
      const closes=res.candles.map(c=>c.c);
      const rsiArr=rsiCalc(closes,14);
      const rsi=rsiArr[rsiArr.length-1];
      if(rsi===null||isNaN(rsi))continue;
      const prev=rsiAlarmState[sym]||'neutral';
      let now='neutral';
      if(rsi>=70)now='overbought';
      else if(rsi<=30)now='oversold';
      // Trigger only on state change into overbought/oversold
      if(now!==prev&&now!=='neutral'){
        const alarm={sym,dir:now==='overbought'?'above':'below',price:rsi,isRsi:true,id:Date.now()+Math.random()};
        playAlarmSound();
        showRsiPopup(sym,rsi,now);
        setStatus('⚡ RSI-Alarm: '+sym+' '+(now==='overbought'?'überkauft':'überverkauft')+' (RSI '+rsi.toFixed(1)+')','err');
        if(Notification.permission==='granted')new Notification('RSI-Alarm: '+sym,{body:(now==='overbought'?'Überkauft':'Überverkauft')+' (RSI '+rsi.toFixed(1)+')'});
        sendAlarmEmail({sym,dir:now==='overbought'?'above':'below',price:rsi,isRsi:true});
      }
      rsiAlarmState[sym]=now;
      saveRsiAlarmState();
    }catch{}
    await new Promise(r=>setTimeout(r,300));
  }
  statusEl.textContent='Letzter Check: '+new Date().toLocaleTimeString('de-DE');
}
function showRsiPopup(sym,rsi,type){
  const isOver=type==='overbought';
  document.getElementById('pop-body').textContent=sym+' ist '+(isOver?'überkauft':'überverkauft')+' — RSI '+rsi.toFixed(1);
  document.getElementById('pop-meta').textContent='RSI(14) '+(isOver?'≥ 70':'≤ 30')+' · '+new Date().toLocaleString('de-DE');
  const bar=document.getElementById('pop-bar');bar.style.animation='none';requestAnimationFrame(()=>requestAnimationFrame(()=>{bar.style.animation='barDown 8s linear forwards';}));
  document.getElementById('al-popup').style.display='flex';
  if(popupTimer)clearTimeout(popupTimer);popupTimer=setTimeout(()=>document.getElementById('al-popup').style.display='none',8000);
}
function startRsiAlarms(){
  if(rsiAlarmInterval)clearInterval(rsiAlarmInterval);
  checkRsiAlarms(); // run once immediately
  rsiAlarmInterval=setInterval(checkRsiAlarms,5*60*1000); // every 5 min
}
function stopRsiAlarms(){
  if(rsiAlarmInterval){clearInterval(rsiAlarmInterval);rsiAlarmInterval=null;}
  document.getElementById('al-rsi-status').textContent='Deaktiviert';
}
document.getElementById('al-rsi-enabled').addEventListener('change',e=>{
  if(e.target.checked){
    localStorage.setItem('zen_rsiAlarmEnabled','1');

// ── Cloud-Alarme (Google Apps Script Backend) ────────────────
const CLOUD_WEBHOOK_URL='https://script.google.com/macros/s/AKfycbwFVvK46TJ-nlFU3c_9LwTNyOWHZtPAsnj8pPDiZEi1M5-1zUzYLs74R28dM6RFT0-r/exec';
async function cloudRequest(action,data){
  try{
    const email=localStorage.getItem('zen_alarm_email')||'';
    const payload={action,email,...data};
    await fetch(CLOUD_WEBHOOK_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(payload)
    });
    return true;
  }catch(e){console.warn('Cloud error',e);return false;}
}
// GET-based list fetch (works with CORS because GET on Google Apps Script is permissive)
async function cloudFetchAlarms(){
  try{
    const email=localStorage.getItem('zen_alarm_email')||'';
    if(!email)return null;
    const url=CLOUD_WEBHOOK_URL+'?action=list&email='+encodeURIComponent(email);
    const resp=await fetch(url);
    if(!resp.ok)return null;
    const data=await resp.json();
    if(data.status==='ok'&&Array.isArray(data.alarms))return data.alarms;
    return null;
  }catch(e){console.warn('Cloud fetch error',e);return null;}
}
async function syncCloudAlarms(){
  const cloudRows=await cloudFetchAlarms();
  if(!cloudRows){setStatus('⚠ Cloud-Sync fehlgeschlagen','err');setTimeout(()=>setStatus('Bereit','idle'),3000);return;}
  // Merge: cloud rows replace local alarms (cloud is source of truth)
  const fresh=cloudRows.filter(r=>r[0]&&r[2]&&String(r[3]).trim()==='active').map(r=>({
    sym:String(r[0]).trim(),
    dir:String(r[1]).trim(),
    price:parseFloat(r[2]),
    id:Date.now()+Math.random(),
    triggered:false
  }));
  alarms=fresh;
  renderAlarmTags();
  if(mainChart)mainChart.update('none');
  redrawOC();
  setStatus('☁️ '+fresh.length+' Alarme aus Cloud geladen','ok');
  setTimeout(()=>setStatus('Bereit','idle'),3000);
}
async function cloudAddAlarm(sym,type,price){
  const email=localStorage.getItem('zen_alarm_email')||'';
  if(!email){
    setStatus('⚠ Erst E-Mail in der Toolbar speichern!','err');
    return;
  }
  const cur=getCurrency(sym);
  const ok=await cloudRequest('add',{symbol:sym,type,price});
  if(ok){
    setStatus('☁️ '+sym+' '+(type==='above'?'≥':'≤')+' '+cur+price.toFixed(2)+' → Cloud gespeichert','ok');
    setTimeout(()=>setStatus('Bereit','idle'),4000);
  }
}
async function cloudListAlarms(){
  await syncCloudAlarms();
}

// ── Watchlist — init prices on startup ────────────────────────
function loadWL(){
  try{watchlist=JSON.parse(localStorage.getItem('cp-wl8'))||[];}catch{watchlist=[];}
  if(!watchlist.length)watchlist=['SAP.DE','AAPL','MSFT','BMW.DE'];
  renderWL();
  // Load prices for all symbols immediately on startup
  setTimeout(updateWLPrices,500);
  // Fetch company names for all watchlist symbols
  setTimeout(()=>watchlist.forEach(s=>{if(!getSymName(s))fetchSymName(s);}),2000);
}
function saveWL(){
  try{localStorage.setItem('cp-wl8',JSON.stringify(watchlist));}catch{}
  // Also sync to cloud (debounced to avoid hammering on rapid reorder)
  if(localStorage.getItem('zen_alarm_email')){
    clearTimeout(saveWL._t);
    saveWL._t=setTimeout(()=>cloudPushWatchlist(),500);
  }
}
function renderWL(){
  const el=document.getElementById('wl-list');
  el.innerHTML=watchlist.map((s,idx)=>{
    const id=s.replace(/\W/g,'_');
    const name=getSymName(s);
    const displayName=name||s; // fallback: kürzel wenn kein name bekannt
    return `<div class="wl-item${s===currentSymbol?' active':''}" data-sym="${s}" data-idx="${idx}" draggable="true">
      <div class="wl-row">
        <span class="wl-name">${displayName}</span>
        ${name?`<span class="wl-sym">${s}</span>`:''}
      </div>
      <div class="wl-row">
        <span class="wl-price" id="wlp-${id}">…</span>
        <span class="wl-chg" id="wlc-${id}">…</span>
      </div>
      <span class="wl-del" data-del="${s}">✕</span>
    </div>`;
  }).join('');
  // Click handlers
  el.querySelectorAll('.wl-item').forEach(it=>it.addEventListener('click',e=>{if(e.target.classList.contains('wl-del'))return;currentSymbol=it.dataset.sym;document.getElementById('sym-in').value=currentSymbol;renderWL();fetchData(currentSymbol,currentTF);}));
  el.querySelectorAll('.wl-del').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();watchlist=watchlist.filter(s=>s!==b.dataset.del);saveWL();renderWL();}));
  // Drag & drop reorder
  let dragIdx=null;
  el.querySelectorAll('.wl-item').forEach(it=>{
    it.addEventListener('dragstart',e=>{dragIdx=+it.dataset.idx;it.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
    it.addEventListener('dragend',()=>{it.style.opacity='';el.querySelectorAll('.wl-item').forEach(x=>x.classList.remove('wl-dragover'));});
    it.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';it.classList.add('wl-dragover');});
    it.addEventListener('dragleave',()=>it.classList.remove('wl-dragover'));
    it.addEventListener('drop',e=>{
      e.preventDefault();it.classList.remove('wl-dragover');
      const dropIdx=+it.dataset.idx;
      if(dragIdx!==null&&dragIdx!==dropIdx){
        const item=watchlist.splice(dragIdx,1)[0];
        watchlist.splice(dropIdx,0,item);
        saveWL();renderWL();
      }
      dragIdx=null;
    });
  });
}
async function updateWLPrices(){
  const wlResults={};
  for(const sym of watchlist){
    try{
      let lastPrice=null,pct=0,dollarChg=0;
      try{
        const res=await loadCandles(sym,'d1');
        if(res&&res.candles.length>1){
          const last=res.candles[res.candles.length-1];
          const prev=res.candles[res.candles.length-2];
          lastPrice=last.c;
          dollarChg=last.c-prev.c;
          pct=dollarChg/prev.c*100;
        }
      }catch{}
      if(lastPrice===null){wlResults[sym]={p:'—',c:'—',col:'var(--text3)'};setWLChg(sym,'—','—','var(--text3)');continue;}
      const col=pct>=0?'var(--up)':'var(--dn)';
      const sign=pct>=0?'+':'';
      const cur=getCurrency(sym);
      const pTxt=cur+lastPrice.toFixed(2),cTxt=sign+dollarChg.toFixed(2)+' ('+sign+pct.toFixed(2)+'%)';
      wlResults[sym]={p:pTxt,c:cTxt,col};
      setWLChg(sym,pTxt,cTxt,col);
      if(sym===currentSymbol)document.getElementById('cur-price').textContent=cur+lastPrice.toFixed(2);
    }catch{wlResults[sym]={p:'—',c:'—',col:'var(--text3)'};}
    await new Promise(r=>setTimeout(r,400));
  }
  // Re-render to show company names discovered from Yahoo, then reapply prices
  renderWL();
  for(const sym of watchlist){const r=wlResults[sym];if(r)setWLChg(sym,r.p,r.c,r.col);}
}
function setWLChg(sym,priceText,chgText,color){
  const id=sym.replace(/\W/g,'_');
  const pEl=document.getElementById('wlp-'+id);
  const cEl=document.getElementById('wlc-'+id);
  if(pEl)pEl.textContent=priceText;
  if(cEl){cEl.textContent=chgText;cEl.style.color=color;}
}
document.getElementById('add-wl-btn').addEventListener('click',()=>{
  const s=document.getElementById('sym-in').value.trim().toUpperCase();
  if(s&&!watchlist.includes(s)){watchlist.push(s);saveWL();renderWL();updateWLPrices();}
});

// ── Watchlist width resize ───────────────────────────────────
(function(){
  const handle=document.getElementById('wl-resize');
  const wl=document.getElementById('watchlist');
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();dragging=true;startX=e.clientX;startW=wl.offsetWidth;
    document.body.style.cursor='ew-resize';
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    // Watchlist is on the right, so dragging left = wider
    const newW=Math.min(300,Math.max(100,startW-(e.clientX-startX)));
    wl.style.width=newW+'px';
    syncOC();redrawOC();
  });
  document.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;document.body.style.cursor='';
      try{localStorage.setItem('zen_wl_width',wl.offsetWidth);}catch{}
    }
  });
  // Restore saved width
  try{const sw=localStorage.getItem('zen_wl_width');if(sw)wl.style.width=sw+'px';}catch{}
})();

// ── Live price refresh (every 30s for intraday) ──────────────
let liveInterval=null;
function startLiveRefresh(){
  if(liveInterval)clearInterval(liveInterval);
  // 5m→15s, 1h→20s, 4h→30s, D1→60s, M1→5min
  const intervals={'5m':15000,'1h':20000,'4h':30000,d1:60000,m1:300000};
  const ms=intervals[currentTF]||60000;
  let refreshing=false;
  let lastKnownPrice=candles.length?candles[candles.length-1].c:0;
  liveInterval=setInterval(async()=>{
    if(refreshing)return;
    refreshing=true;
    try{
      const res=await loadCandles(currentSymbol,currentTF);
      if(res&&res.candles.length>0){
        const oldPrice=lastKnownPrice;
        candles=res.candles;
        updateView();
        const last=candles[candles.length-1],prev=candles.length>1?candles[candles.length-2]:last;
        const newPrice=last.c;
        document.getElementById('cur-price').textContent=fmtPrice(last.c);
        const chg=last.c-prev.c,pct=prev.c>0?chg/prev.c*100:0;
        const ce=document.getElementById('price-chg');
        ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+' ('+(chg>=0?'+':'')+pct.toFixed(2)+'%)';
        ce.className=chg>=0?'up':'dn';
        // Flash effect on price change
        if(Math.abs(newPrice-oldPrice)>0.001){
          const flashClass=newPrice>oldPrice?'flash-up':'flash-dn';
          const priceEl=document.getElementById('cur-price');
          const chgEl=document.getElementById('price-chg');
          priceEl.classList.add(flashClass);chgEl.classList.add(flashClass);
          // Flash watchlist too
          const wlId=currentSymbol.replace(/\W/g,'_');
          const wlP=document.getElementById('wlp-'+wlId);
          const wlC=document.getElementById('wlc-'+wlId);
          if(wlP)wlP.classList.add(flashClass);
          if(wlC)wlC.classList.add(flashClass);
          setTimeout(()=>{
            priceEl.classList.remove(flashClass);chgEl.classList.remove(flashClass);
            if(wlP)wlP.classList.remove(flashClass);
            if(wlC)wlC.classList.remove(flashClass);
          },5000);
          lastKnownPrice=newPrice;
        }
      }
    }catch{}finally{refreshing=false;}
  },ms);
}

// ── Candle countdown ─────────────────────────────────────────
function candleCountdown(){
  const el=document.getElementById('candle-cd');
  if(!el||!candles.length)return;
  const now=Date.now();
  const tfMs={'5m':5*60000,'1h':60*60000,'4h':4*60*60000,d1:24*60*60000,m1:30*24*60*60000};
  const ms=tfMs[currentTF]||24*60*60000;
  const lastT=candles[candles.length-1].t.getTime();
  const nextT=lastT+ms;
  const rem=Math.max(0,nextT-now);
  if(rem<=0){el.textContent='';return;}
  const h=Math.floor(rem/3600000),m=Math.floor((rem%3600000)/60000),s=Math.floor((rem%60000)/1000);
  if(h>0)el.textContent=h+'h '+m+'m '+s+'s';
  else if(m>0)el.textContent=m+'m '+s+'s';
  else el.textContent=s+'s';
}
setInterval(candleCountdown,1000);

// ── Persistence — save/restore drawings, views, settings ─────
function saveState(){
  try{
    localStorage.setItem('zen_drawings',JSON.stringify(drawings));
    localStorage.setItem('zen_symbolViews',JSON.stringify(symbolViews));
    localStorage.setItem('zen_lastSymbol',currentSymbol);
    localStorage.setItem('zen_lastTF',currentTF);
    localStorage.setItem('zen_indicators',JSON.stringify({
      showSMA200,showSMA50,showEMA21,showBB,showRSI,showSRSI,showMACD,showATR,showVol,showVolProfile
    }));
    localStorage.setItem('zen_alarms',JSON.stringify(alarms));
    localStorage.setItem('zen_panelDrawings',JSON.stringify(panelDrawings));
  }catch(e){console.warn('Save state failed',e);}
}
function loadState(){
  try{
    const d=localStorage.getItem('zen_drawings');if(d)drawings=JSON.parse(d);
    const sv=localStorage.getItem('zen_symbolViews');if(sv){const parsed=JSON.parse(sv);Object.assign(symbolViews,parsed);}
    const al=localStorage.getItem('zen_alarms');if(al)alarms=JSON.parse(al).map(a=>({...a,triggered:false}));
    const pd=localStorage.getItem('zen_panelDrawings');if(pd)Object.assign(panelDrawings,JSON.parse(pd));
    const ind=localStorage.getItem('zen_indicators');
    if(ind){
      const o=JSON.parse(ind);
      showSMA200=o.showSMA200??true;showSMA50=o.showSMA50??true;showEMA21=o.showEMA21??true;
      showBB=o.showBB??false;showRSI=o.showRSI??true;showSRSI=o.showSRSI??true;
      showMACD=o.showMACD??true;showATR=o.showATR??true;showVol=o.showVol??true;showVolProfile=o.showVolProfile??true;
      // Sync indicator button states
      document.querySelectorAll('[data-ind]').forEach(btn=>{
        const ind=btn.dataset.ind;const states={vol:showVol,sma200:showSMA200,sma50:showSMA50,ema21:showEMA21,bb:showBB,rsi:showRSI,srsi:showSRSI,macd:showMACD,atr:showATR,volprofile:showVolProfile};
        if(states[ind]!==undefined)btn.classList.toggle('ab',states[ind]);
      });
    }
  }catch(e){console.warn('Load state failed',e);}
}
// Auto-save every 5 seconds and on page unload
setInterval(saveState,5000);
window.addEventListener('beforeunload',saveState);
